services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  smtp4dev:
    image: rnwood/smtp4dev:latest
    restart: unless-stopped
    ports:
      - "5000:80"
      - "2525:25"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/25'"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/appdb
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  product-notifier:
    build: ./backend
    command: python product_notifier.py
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/appdb
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      SMTP_HOST: smtp4dev
      SMTP_PORT: "25"
      DEBUG: "false"
    depends_on:
      rabbitmq:
        condition: service_healthy
      smtp4dev:
        condition: service_healthy

  order-notifier:
    build: ./backend
    command: python order_notifier.py
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/appdb
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      SMTP_HOST: smtp4dev
      SMTP_PORT: "25"
      DEBUG: "false"
    depends_on:
      rabbitmq:
        condition: service_healthy
      smtp4dev:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:8000
        VITE_ENTRA_AUTHORITY: https://etoddlersciam.ciamlogin.com/31e396da-ee2b-4c54-a802-98218e952c34
        VITE_ENTRA_CLIENT_ID: 144f4d0f-6ba5-470e-851a-29841afe95b8
        VITE_ENTRA_SCOPES: "openid offline_access profile"
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
